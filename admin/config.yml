backend:
  name: github
  repo: SiLiN-ua/silin-ua.github.io      # заміни якщо назва репо інша
  branch: main
  base_url: https://silin-ua.github.io   # sveltia uses PKCE, no proxy needed
  auth_type: pkce
  app_id: REPLACE_WITH_GITHUB_OAUTH_APP_CLIENT_ID

media_folder: "img/uploads"
public_folder: "/img/uploads"

# Мова адмінки
locale: uk

collections:

  # ---------- КЕЙСИ ----------
  - name: cases
    label: "Кейси"
    label_singular: "Кейс"
    folder: "content/cases"
    create: true
    slug: "{{slug}}"
    identifier_field: title_uk
    extension: json
    format: json
    summary: "{{title_uk}} — {{date}}"
    sortable_fields: [date, title_uk]
    fields:
      - { name: title_uk,    label: "Назва (UA)",              widget: string }
      - { name: title_en,    label: "Title (EN)",              widget: string, required: false }
      - { name: date,        label: "Дата",                    widget: datetime, date_format: "DD.MM.YYYY", time_format: false }
      - { name: tag,         label: "Тег",                     widget: string, hint: "Наприклад: Crypto Fraud, Identity Attribution" }
      - { name: summary_uk,  label: "Короткий опис (UA)",      widget: text }
      - { name: summary_en,  label: "Short description (EN)",  widget: text, required: false }
      - { name: cover,       label: "Обкладинка (опційно)",    widget: image, required: false }
      - { name: body_uk,     label: "Повний текст (UA)",       widget: markdown, required: false }
      - { name: body_en,     label: "Full text (EN)",          widget: markdown, required: false }
      - { name: linkedin,    label: "LinkedIn URL (опційно)",  widget: string, required: false }
      - { name: published,   label: "Опубліковано",            widget: boolean, default: true }

  # ---------- НОВИНИ / СТАТТІ ----------
  - name: posts
    label: "Новини та статті"
    label_singular: "Стаття"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    identifier_field: title_uk
    extension: json
    format: json
    summary: "{{title_uk}} — {{date}}"
    sortable_fields: [date, title_uk]
    fields:
      - { name: title_uk,    label: "Заголовок (UA)",          widget: string }
      - { name: title_en,    label: "Title (EN)",              widget: string, required: false }
      - { name: date,        label: "Дата",                    widget: datetime, date_format: "DD.MM.YYYY", time_format: false }
      - { name: tag,         label: "Категорія",               widget: string, hint: "Наприклад: OSINT, Case study, Опінія" }
      - { name: summary_uk,  label: "Анонс (UA)",              widget: text }
      - { name: summary_en,  label: "Summary (EN)",            widget: text, required: false }
      - { name: cover,       label: "Обкладинка (опційно)",    widget: image, required: false }
      - { name: body_uk,     label: "Повний текст (UA)",       widget: markdown, required: false }
      - { name: body_en,     label: "Full text (EN)",          widget: markdown, required: false }
      - { name: linkedin,    label: "LinkedIn URL (опційно)",  widget: string, required: false }
      - { name: published,   label: "Опубліковано",            widget: boolean, default: true }

  # ---------- ІНСТРУМЕНТИ ----------
  - name: tools
    label: "Інструменти"
    label_singular: "Інструмент"
    folder: "content/tools"
    create: true
    slug: "{{slug}}"
    identifier_field: name
    extension: json
    format: json
    summary: "{{name}} · {{category}}"
    sortable_fields: [category, name]
    fields:
      - { name: name,           label: "Назва",                    widget: string }
      - { name: category,       label: "Категорія",                widget: string, hint: "Наприклад: Username search, Face recognition, Telegram OSINT, Breach data" }
      - { name: url,            label: "URL інструменту",          widget: string, required: false }
      - { name: own_project,    label: "Мій власний проєкт",       widget: boolean, default: false }
      - { name: description_uk, label: "Короткий опис (UA)",       widget: text }
      - { name: description_en, label: "Short description (EN)",   widget: text, required: false }
      - { name: body_uk,        label: "Повний огляд (UA)",        widget: markdown, required: false }
      - { name: body_en,        label: "Full review (EN)",         widget: markdown, required: false }
      - { name: cover,          label: "Скріншот/іконка",          widget: image, required: false }
      - { name: published,      label: "Опубліковано",             widget: boolean, default: true }

  # ---------- КНИГИ ----------
  - name: books
    label: "Книги"
    label_singular: "Книга"
    folder: "content/books"
    create: true
    slug: "{{slug}}"
    identifier_field: title_uk
    extension: json
    format: json
    summary: "{{title_uk}} · {{year}}"
    sortable_fields: [year, title_uk]
    fields:
      - { name: title_uk,    label: "Назва (UA)",              widget: string }
      - { name: title_en,    label: "Title (EN)",              widget: string, required: false }
      - { name: year,        label: "Рік",                     widget: number, value_type: int }
      - { name: languages,   label: "Мови",                    widget: string, hint: "Наприклад: UA / EN / RU" }
      - { name: cover,       label: "Обкладинка",              widget: image, required: false }
      - { name: description_uk, label: "Опис (UA)",            widget: text }
      - { name: description_en, label: "Description (EN)",     widget: text, required: false }
      - { name: buy_url,     label: "Посилання купити/читати", widget: string, required: false }
      - { name: order,       label: "Порядок відображення",    widget: number, value_type: int, default: 0 }
      - { name: published,   label: "Опубліковано",            widget: boolean, default: true }
